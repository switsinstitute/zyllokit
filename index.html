<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>ZylloKit Pro | Premium Developer Tools & Utility Suite by SWITS</title>
    <meta name="description" content="ZylloKit Pro by SWITS Institute offers high-performance developer tools including QR Generator, JSON Prettifier, and Glassmorphism CSS Designer. Secure, fast, and private.">
    <meta name="keywords" content="QR Code Generator, JSON Prettifier, Glassmorphism CSS, Developer Tools, SWITS Institute, Free Web Tools, Pakistan IT Tools">
    <meta name="author" content="SWITS Institute">
    <meta name="robots" content="index, follow">

    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <link rel="shortcut icon" type="image/png" href="/favicon.png">
    <meta property="og:image" content="https://zyllokit.pages.dev/favicon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        brand: '#10b981', 
                        darker: '#050505', 
                        surface: '#0f1715',
                        accent: '#134e4a'
                    },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background: radial-gradient(circle at top right, #0d2d24, #050505); min-height: 100vh; color: #e2e8f0; }
        .glass-card { background: rgba(15, 23, 21, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(16, 185, 129, 0.1); }
        .neon-glow { box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        .ad-placeholder { background: repeating-linear-gradient(45deg, rgba(16, 185, 129, 0.03), rgba(16, 185, 129, 0.03) 10px, transparent 10px, transparent 20px); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #134e4a; border-radius: 10px; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        textarea::placeholder { color: rgba(255,255,255,0.2); }
    </style>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6595809375510733" crossorigin="anonymous"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const AdSlot = ({ label }) => (
            <div className="w-full ad-placeholder border border-brand/10 rounded-2xl p-4 flex flex-col items-center justify-center text-center group transition-all my-6">
                <div className="text-[10px] text-brand/40 uppercase tracking-widest mb-2">Advertisement Slot - {label}</div>
                <div className="h-8 w-8 bg-brand/5 rounded-full flex items-center justify-center text-brand/30">
                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                </div>
            </div>
        );

        const ContactPage = () => (
            <div className="fade-in space-y-8 max-w-3xl mx-auto py-10 px-4">
                <h2 className="text-3xl md:text-4xl font-extrabold tracking-tighter text-center text-white">Contact <span className="text-brand">Support</span></h2>
                <div className="glass-card rounded-[2rem] p-8 md:p-12 text-center space-y-6">
                    <p className="text-gray-400 italic">"Empowering the next generation of IT professionals."</p>
                    <div className="py-6 border-y border-white/5">
                        <h4 className="text-brand font-bold uppercase tracking-widest text-xs mb-2">Official Institutional Email</h4>
                        <a href="mailto:skillswithitsolution@gmail.com" className="text-xl md:text-2xl font-bold text-white hover:text-brand transition-colors">skillswithitsolution@gmail.com</a>
                    </div>
                    <p className="text-[10px] text-gray-500 uppercase tracking-widest font-bold">SWITS Institute - Karachi, Pakistan</p>
                </div>
            </div>
        );

        const AboutPage = () => (
            <div className="fade-in space-y-8 max-w-3xl mx-auto py-10 px-4">
                <div className="text-center space-y-4">
                    <h2 className="text-3xl md:text-4xl font-extrabold tracking-tighter text-white">About <span className="text-brand">ZylloKit</span></h2>
                    <p className="text-gray-400 font-medium tracking-wide">The Digital Swiss Army Knife for the Modern Web.</p>
                </div>
                <div className="glass-card rounded-[2rem] md:rounded-[2.5rem] p-6 md:p-10 space-y-6 leading-relaxed text-gray-300">
                    <p>ZylloKit is a premium suite of technical utility tools curated by <strong>SWITS Institute</strong>. Our mission is to provide developers, students, and designers with high-performance tools that prioritize data privacy and speed.</p>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
                        <div className="p-4 border border-white/5 rounded-2xl bg-white/5 hover:border-brand/30 transition-colors">
                            <h4 className="text-brand font-bold mb-2">Security First</h4>
                            <p className="text-xs text-gray-500">We use zero-log architecture. Your inputs are processed locally in your browser memory.</p>
                        </div>
                        <div className="p-4 border border-white/5 rounded-2xl bg-white/5 hover:border-brand/30 transition-colors">
                            <h4 className="text-brand font-bold mb-2">Global Standards</h4>
                            <p className="text-xs text-gray-500">Built using React 18 and Tailwind CSS to ensure international performance standards.</p>
                        </div>
                    </div>
                </div>
            </div>
        );

        const PrivacyPage = () => (
            <div className="fade-in space-y-8 max-w-3xl mx-auto py-10 px-4">
                <h2 className="text-3xl md:text-4xl font-extrabold tracking-tighter text-center italic text-white">Privacy <span className="text-brand">Protocol</span></h2>
                <div className="glass-card rounded-[2rem] md:rounded-[2.5rem] p-6 md:p-10 space-y-8">
                    <section>
                        <h3 className="text-lg md:text-xl font-bold text-white mb-3 underline decoration-brand">1. Local Execution</h3>
                        <p className="text-gray-400 text-sm">All formatting and generation tasks are handled via client-side scripts. Your code, text, or links are never uploaded to our servers.</p>
                    </section>
                    <section>
                        <h3 className="text-lg md:text-xl font-bold text-white mb-3 underline decoration-brand">2. Cookie Policy</h3>
                        <p className="text-gray-400 text-sm">We use minimal cookies for Google AdSense and Cloudflare performance monitoring to provide a better user experience.</p>
                    </section>
                </div>
            </div>
        );

        const TermsPage = () => (
            <div className="fade-in space-y-8 max-w-3xl mx-auto py-10 px-4">
                <h2 className="text-3xl md:text-4xl font-extrabold tracking-tighter text-center text-white">Terms of <span className="text-brand">Use</span></h2>
                <div className="glass-card rounded-[2rem] p-6 md:p-10 space-y-6">
                    <p className="text-gray-400 text-sm leading-relaxed">By accessing ZylloKit, you agree to use these tools for lawful purposes only. SWITS Institute provides these utilities as-is without any warranties.</p>
                    <ul className="text-xs text-gray-500 list-disc ml-5 space-y-2 uppercase tracking-tighter">
                        <li>Free for personal and commercial projects.</li>
                        <li>No redistribution of tool source code without permission.</li>
                        <li>Educational use encouraged by SWITS Institute.</li>
                    </ul>
                </div>
            </div>
        );

        const ToolsPage = ({ activeTab, setActiveTab, qrText, setQrText, jsonInput, setJsonInput, jsonError, handleJsonFormat, blur, setBlur, opacity, setOpacity, downloadQR }) => (
            <div className="fade-in px-4">
                <div className="flex p-1.5 bg-darker/50 rounded-2xl border border-white/5 mb-8 max-w-md mx-auto overflow-x-auto">
                    {['qr', 'json', 'glass'].map(t => (
                        <button key={t} onClick={() => setActiveTab(t)} className={`flex-1 py-3 px-2 rounded-xl text-[10px] md:text-sm font-bold transition-all whitespace-nowrap ${activeTab === t ? 'bg-brand text-black shadow-xl' : 'text-gray-400 hover:text-white'}`}>
                            {t === 'qr' ? 'QR ENGINE' : t === 'json' ? 'JSON FIXER' : 'UI DESIGN'}
                        </button>
                    ))}
                </div>

                <div className="glass-card rounded-[2rem] md:rounded-[2.5rem] p-6 md:p-12 shadow-2xl relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-64 h-64 bg-brand/5 rounded-full blur-[100px] pointer-events-none"></div>
                    
                    {activeTab === 'qr' && (
                        <div className="grid md:grid-cols-2 gap-8 md:gap-12 items-center">
                            <div className="space-y-6 order-2 md:order-1 text-left">
                                <h3 className="text-2xl font-bold text-white tracking-tight">QR Generator Pro</h3>
                                <p className="text-xs text-gray-500">Convert any URL or text into a high-density QR code instantly.</p>
                                <textarea value={qrText} onChange={(e) => setQrText(e.target.value)} className="w-full bg-black/40 border border-white/10 p-5 rounded-2xl focus:border-brand transition-all outline-none h-40 font-mono text-sm text-white" placeholder="Enter link or text here..." />
                                <button onClick={downloadQR} className="w-full py-4 bg-white/5 border border-white/10 rounded-2xl font-bold hover:bg-white/10 transition active:scale-95 text-white">DOWNLOAD PNG</button>
                            </div>
                            <div className="flex flex-col items-center justify-center order-1 md:order-2">
                                <div className="bg-white p-4 md:p-6 rounded-[1.5rem] md:rounded-[2rem] shadow-2xl border-[6px] md:border-[8px] border-brand/20" id="qrcode"></div>
                                <p className="text-[10px] text-gray-500 mt-4 uppercase tracking-widest font-bold">Institutional Security Verified</p>
                            </div>
                        </div>
                    )}

                    {activeTab === 'json' && (
                        <div className="space-y-6">
                            <div className="flex justify-between items-center">
                                <div>
                                    <h3 className="text-2xl font-bold tracking-tight text-white text-left">JSON Prettifier</h3>
                                    <p className="text-xs text-gray-500 text-left">Validate and format messy JSON strings into clean, readable code.</p>
                                </div>
                                {jsonError && <span className="text-red-500 text-[10px] font-bold bg-red-500/10 px-3 py-1 rounded-full animate-pulse border border-red-500/20">{jsonError}</span>}
                            </div>
                            <textarea 
                                value={jsonInput} 
                                onChange={(e) => setJsonInput(e.target.value)} 
                                placeholder="Paste your raw JSON code here..." 
                                className={`w-full h-80 bg-black/40 border p-6 rounded-[1.5rem] md:rounded-[2rem] font-mono text-sm focus:border-brand outline-none transition-all text-white ${jsonError ? 'border-red-500/50' : 'border-white/10'}`} 
                            />
                            <div className="flex flex-col md:flex-row gap-4">
                                <button onClick={handleJsonFormat} className="flex-[2] py-4 bg-brand text-black font-extrabold rounded-2xl hover:brightness-110 active:scale-95 transition">FORMAT CODE</button>
                                <button onClick={() => { if(!jsonInput){return;} navigator.clipboard.writeText(jsonInput); }} className="flex-1 py-4 bg-white/5 border border-white/10 rounded-2xl font-bold hover:bg-white/10 active:scale-95 transition text-white">COPY</button>
                            </div>
                        </div>
                    )}

                    {activeTab === 'glass' && (
                        <div className="grid md:grid-cols-2 gap-12">
                            <div className="space-y-8 text-left">
                                <h3 className="text-2xl font-bold tracking-tight text-white">Glassmorphism UI</h3>
                                <p className="text-xs text-gray-500">Real-time CSS generator for modern frosted-glass effects.</p>
                                <div className="space-y-6">
                                    <div className="space-y-2">
                                        <div className="flex justify-between text-xs font-bold uppercase text-gray-500"><span>Blur Level</span><span>{blur}px</span></div>
                                        <input type="range" min="0" max="40" value={blur} onChange={(e) => setBlur(e.target.value)} className="w-full h-2 bg-white/5 rounded-lg appearance-none cursor-pointer accent-brand" />
                                    </div>
                                    <div className="space-y-2">
                                        <div className="flex justify-between text-xs font-bold uppercase text-gray-500"><span>Transparency</span><span>{opacity}</span></div>
                                        <input type="range" min="0" max="1" step="0.1" value={opacity} onChange={(e) => setOpacity(e.target.value)} className="w-full h-2 bg-white/5 rounded-lg appearance-none cursor-pointer accent-brand" />
                                    </div>
                                </div>
                            </div>
                            <div className="h-64 rounded-[2rem] relative overflow-hidden flex items-center justify-center border border-white/5 bg-black/20">
                                <div style={{ backdropFilter: `blur(${blur}px)`, background: `rgba(255,255,255,${opacity})` }} className="w-2/3 h-2/3 rounded-3xl border border-white/20 shadow-2xl flex items-center justify-center">
                                    <span className="font-bold text-[10px] tracking-widest uppercase text-white/50">CSS PREVIEW</span>
                                </div>
                            </div>
                        </div>
                    )}
                </div>

                {/* Power Feature: SEO Content Section */}
                <div className="mt-20 grid md:grid-cols-3 gap-10 text-left border-t border-white/5 pt-16">
                    <div className="space-y-4">
                        <div className="h-1 bg-brand w-12 rounded-full"></div>
                        <h3 className="text-white font-bold text-lg">Why Use ZylloKit?</h3>
                        <p className="text-gray-400 text-xs leading-relaxed">Unlike other online converters, ZylloKit is designed for efficiency. By utilizing client-side rendering, we ensure that your data is never sent to a backend, making it the most secure choice for developers.</p>
                    </div>
                    <div className="space-y-4">
                        <div className="h-1 bg-brand w-12 rounded-full"></div>
                        <h3 className="text-white font-bold text-lg">Advanced Analytics</h3>
                        <p className="text-gray-400 text-xs leading-relaxed">Our tools are built to handle large datasets. Whether it is a massive JSON file or complex URLs for QR codes, the React 18 engine handles it with sub-millisecond latency.</p>
                    </div>
                    <div className="space-y-4">
                        <div className="h-1 bg-brand w-12 rounded-full"></div>
                        <h3 className="text-white font-bold text-lg">Educational Tool</h3>
                        <p className="text-gray-400 text-xs leading-relaxed">SWITS Institute integrates ZylloKit into its curriculum to teach students about modern UI/UX design, data structures, and the importance of browser-based processing.</p>
                    </div>
                </div>
            </div>
        );

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [activeTab, setActiveTab] = useState('qr');
            const [qrText, setQrText] = useState('https://zyllokit.pages.dev');
            const [jsonInput, setJsonInput] = useState('');
            const [jsonError, setJsonError] = useState(null);
            const [blur, setBlur] = useState(15);
            const [opacity, setOpacity] = useState(0.2);

            const downloadQR = () => {
                const img = document.querySelector('#qrcode img');
                if (img) {
                    const link = document.createElement('a');
                    link.href = img.src;
                    link.download = 'ZylloKit_QR.png';
                    link.click();
                }
            };

            const handleJsonFormat = () => {
                try {
                    if (!jsonInput.trim()) return;
                    const parsed = JSON.parse(jsonInput);
                    setJsonInput(JSON.stringify(parsed, null, 4));
                    setJsonError(null);
                } catch(e) {
                    setJsonError("Invalid JSON Syntax");
                }
            };

            useEffect(() => {
                if (currentPage === 'home' && activeTab === 'qr') {
                    const container = document.getElementById("qrcode");
                    if (container) {
                        container.innerHTML = "";
                        new QRCode(container, {
                            text: qrText || " ", width: 200, height: 200,
                            colorDark: "#050505", colorLight: "#ffffff",
                            correctLevel: QRCode.CorrectLevel.H
                        });
                    }
                }
            }, [qrText, activeTab, currentPage]);

            return (
                <div className="pb-20">
                    <nav className="p-6 flex justify-between items-center max-w-6xl mx-auto">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => setCurrentPage('home')}>
                            <div className="h-10 w-10 bg-gradient-to-br from-brand to-emerald-800 rounded-xl flex items-center justify-center font-extrabold text-black shadow-lg neon-glow">ZK</div>
                            <div className="hidden sm:block">
                                <h1 className="text-xl font-extrabold tracking-tighter leading-none uppercase text-white">ZYLLOKIT PRO</h1>
                                <p className="text-[10px] text-gray-500 tracking-[3px] uppercase">By SWITS Institute</p>
                            </div>
                        </div>
                        <div className="flex gap-4 md:gap-6 text-[10px] font-bold uppercase tracking-widest text-gray-400">
                            <button onClick={() => setCurrentPage('home')} className={`hover:text-brand transition ${currentPage === 'home' ? 'text-brand underline decoration-brand' : ''}`}>Tools</button>
                            <button onClick={() => setCurrentPage('about')} className={`hover:text-brand transition ${currentPage === 'about' ? 'text-brand underline decoration-brand' : ''}`}>About</button>
                            <button onClick={() => setCurrentPage('privacy')} className={`hover:text-brand transition ${currentPage === 'privacy' ? 'text-brand underline decoration-brand' : ''}`}>Privacy</button>
                            <button onClick={() => setCurrentPage('contact')} className={`hover:text-brand transition ${currentPage === 'contact' ? 'text-brand underline decoration-brand' : ''}`}>Support</button>
                        </div>
                    </nav>

                    <div className="max-w-5xl mx-auto px-6"><AdSlot label="Top Header" /></div>

                    <main className="max-w-5xl mx-auto mt-8">
                        {currentPage === 'home' && (
                            <ToolsPage 
                                activeTab={activeTab} setActiveTab={setActiveTab}
                                qrText={qrText} setQrText={setQrText}
                                jsonInput={jsonInput} setJsonInput={setJsonInput}
                                jsonError={jsonError} handleJsonFormat={handleJsonFormat}
                                blur={blur} setBlur={setBlur}
                                opacity={opacity} setOpacity={setOpacity}
                                downloadQR={downloadQR}
                            />
                        )}
                        {currentPage === 'about' && <AboutPage />}
                        {currentPage === 'privacy' && <PrivacyPage />}
                        {currentPage === 'contact' && <ContactPage />}
                        {currentPage === 'terms' && <TermsPage />}

                        <div className="mt-24 px-6 flex flex-col items-center gap-6">
                            <h2 className="text-xl md:text-2xl font-extrabold tracking-tighter text-center uppercase text-white">Managed by <span className="text-brand">SWITS Institute</span></h2>
                            <p className="text-gray-500 text-xs text-center max-w-xl leading-relaxed">
                                Professional grade technical tools for developers. Securely processed on your local device for maximum performance and privacy compliance.
                            </p>
                        </div>
                    </main>

                    <footer className="mt-24 py-12 border-t border-white/5 text-center">
                        <div className="flex justify-center gap-8 mb-6 text-[10px] font-bold uppercase tracking-widest text-gray-600">
                            <button onClick={() => setCurrentPage('privacy')} className="hover:text-brand transition">Privacy Policy</button>
                            <button onClick={() => setCurrentPage('terms')} className="hover:text-brand transition">Terms of Service</button>
                            <button onClick={() => setCurrentPage('contact')} className="hover:text-brand transition">Contact Us</button>
                        </div>
                        <p className="text-[8px] md:text-[9px] text-gray-700 font-bold uppercase tracking-[6px] md:tracking-[10px]">Secure • Private • International Standards</p>
                        <p className="text-[10px] text-gray-800 mt-4">&copy; 2026 SWITS Institute. All Rights Reserved.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
