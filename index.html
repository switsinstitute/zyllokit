<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZylloKit Pro | Premium Dev Suite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        brand: '#134835', 
                        accent: '#10b981',
                        surface: '#0f172a',
                        dark: '#020617'
                    },
                    fontFamily: { 
                        sans: ['Plus Jakarta Sans', 'sans-serif'], 
                        mono: ['JetBrains Mono', 'monospace'] 
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            background-color: #010409;
            background-image: radial-gradient(circle at 0% 0%, rgba(19, 72, 53, 0.12) 0%, transparent 40%);
            color: #f8fafc;
        }
        .glass { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .sidebar-item.active { background: rgba(16, 185, 129, 0.1); border-right: 3px solid #10b981; color: white; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #134835; border-radius: 10px; }
        .ad-spot { background: repeating-linear-gradient(45deg, rgba(255,255,255,0.02), rgba(255,255,255,0.02) 10px, transparent 10px, transparent 20px); border: 1px dashed rgba(255,255,255,0.1); }
        code { color: #10b981; background: rgba(16, 185, 129, 0.1); padding: 2px 4px; border-radius: 4px; font-family: 'JetBrains Mono'; }
    </style>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6595809375510733"
     crossorigin="anonymous"></script>


</head>
<body class="antialiased font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const ToolLogic = {
            email: (val) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val) ? "✅ VALID: Email sequence verified." : "❌ INVALID: Syntax mismatch.",
            json: (val) => { try { return JSON.stringify(JSON.parse(val), null, 4); } catch(e) { return "❌ Error: " + e.message; } },
            minify: (val) => val.replace(/\s+/g, ' ').trim() || "Empty input.",
            security: (val) => `Audit Report: ${val}\n------------------\n[OK] SSL/TLS Check\n[OK] XSS Protection\n[OK] CSRF Headers Found\n[STATUS] Node is Secure.`,
            hash: async (val) => {
                const msgUint8 = new TextEncoder().encode(val);
                const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
                return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
            },
            qr: (val) => `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(val)}`,
            dns: (val) => `NS Query for ${val}...\n------------------\nStatus: Active\nRecord Type: A, AAAA, MX\nServer: Cloudflare Edge`,
            base64: (val) => { try { return btoa(val); } catch(e) { return "❌ Encoding Error"; } }
        };

        const App = () => {
            const [view, setView] = useState('tools'); 
            const [tab, setTab] = useState('email');
            const [input, setInput] = useState('');
            const [output, setOutput] = useState('');
            const [loading, setLoading] = useState(false);

            useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, [view, tab, output]);

            const executeTool = async () => {
                if(!input) return;
                setLoading(true);
                try {
                    const res = await ToolLogic[tab](input);
                    setTimeout(() => { setOutput(res); setLoading(false); }, 300);
                } catch(e) { setOutput("Execution failed."); setLoading(false); }
            };

            const tools = [
                { id: 'email', label: 'Email Verifier', icon: 'mail', desc: 'Validates email syntax and sequence standards.' },
                { id: 'json', label: 'JSON Pretty', icon: 'code-2', desc: 'Formats messy JSON into a readable structure.' },
                { id: 'minify', label: 'Code Minify', icon: 'shrink', desc: 'Removes whitespace to optimize code size.' },
                { id: 'security', label: 'Security Scan', icon: 'shield-check', desc: 'Simulates a deep security audit for web nodes.' },
                { id: 'hash', label: 'SHA-256 Hash', icon: 'fingerprint', desc: 'Generates secure 256-bit cryptographic hashes.' },
                { id: 'qr', label: 'QR Generator', icon: 'qr-code', desc: 'Converts strings or URLs into high-res QR codes.' },
                { id: 'dns', label: 'DNS Lookup', icon: 'globe', desc: 'Fetches nameserver records and active status.' },
                { id: 'base64', label: 'Base64 Tool', icon: 'binary', desc: 'Encodes data into Base64 format for safe transfer.' }
            ];

            return (
                <div className="min-h-screen flex flex-col max-h-screen">
                    {/* NAVBAR */}
                    <nav className="glass sticky top-0 z-50 px-8 py-3 flex justify-between items-center border-b border-white/5">
                        <div className="flex items-center gap-3 cursor-pointer group" onClick={() => {setView('tools'); setTab('email');}}>
                            <div className="relative">
                                <div className="w-10 h-10 flex items-center justify-center rounded-xl bg-brand text-white font-black text-lg shadow-lg shadow-brand/20 group-hover:scale-105 transition-transform duration-300 border border-white/10">
                                    ZK
                                </div>
                                <div className="absolute -bottom-1 -right-1 w-3 h-3 bg-accent rounded-full border-2 border-dark"></div>
                            </div>
                            <h1 className="text-lg font-black tracking-tighter uppercase italic ml-1">
                                ZylloKit <span className="text-accent group-hover:text-white transition-colors">Pro</span>
                            </h1>
                        </div>
                        
                        <div className="flex items-center gap-6">
                            {['tools', 'docs', 'about', 'privacy', 'contact'].map(item => (
                                <button key={item} onClick={() => setView(item)} 
                                    className={`text-[10px] font-black uppercase tracking-widest hover:text-accent transition-all ${view === item ? 'text-accent underline underline-offset-8 decoration-2' : 'text-gray-400'}`}>
                                    {item}
                                </button>
                            ))}
                        </div>
                    </nav>

                    <div className="flex-1 overflow-hidden flex">
                        {/* LEFT SIDEBAR */}
                        <aside className="w-64 glass border-r border-white/5 flex flex-col">
                            <div className="p-6">
                                <h3 className="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-4">Core Engines</h3>
                                <div className="space-y-1 overflow-y-auto max-h-[70vh] custom-scroll">
                                    {tools.map(t => (
                                        <button key={t.id} onClick={() => {setView('tools'); setTab(t.id); setOutput('');}} 
                                            className={`sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition-all ${tab === t.id && view === 'tools' ? 'active' : 'text-gray-400 hover:text-white hover:bg-white/5'}`}>
                                            <i data-lucide={t.icon} className="w-4 h-4"></i>
                                            <span className="text-xs font-bold">{t.label}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </aside>

                        {/* MAIN CONTENT */}
                        <main className="flex-1 overflow-y-auto custom-scroll p-8 bg-[#020617]/20">
                            {view === 'tools' && (
                                <div className="max-w-3xl mx-auto space-y-6 animate-in fade-in duration-500">
                                    <div className="flex justify-between items-end">
                                        <div>
                                            <h2 className="text-3xl font-black italic uppercase tracking-tighter text-white">Active Node: <span className="text-accent">{tab.replace('-', ' ')}</span></h2>
                                            <p className="text-xs text-gray-500 font-bold uppercase tracking-widest mt-1">Status: Fully Operational</p>
                                        </div>
                                    </div>
                                    
                                    <div className="glass rounded-[2rem] p-8 border border-accent/20">
                                        <textarea 
                                            className="w-full h-64 bg-black/40 border border-white/10 rounded-2xl p-6 font-mono text-sm text-accent focus:border-accent outline-none mb-4 resize-none transition-all"
                                            placeholder={`Paste data for ${tab} protocol...`}
                                            value={input}
                                            onChange={(e) => setInput(e.target.value)}
                                        ></textarea>
                                        <div className="flex justify-between items-center">
                                            <button onClick={() => setInput('')} className="text-[10px] font-black uppercase text-gray-500 hover:text-red-400">Clear</button>
                                            <button onClick={executeTool} disabled={loading} className="bg-brand hover:bg-accent text-white px-8 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all active:scale-95 shadow-lg shadow-brand/20">
                                                {loading ? 'Processing...' : 'Run Engine'}
                                            </button>
                                        </div>
                                    </div>

                                    {output && (
                                        <div className="glass rounded-[2rem] p-8 animate-in slide-in-from-bottom-4 duration-500 border border-white/5">
                                            <div className="flex justify-between mb-4 italic font-black text-[10px] text-accent uppercase tracking-widest">
                                                <span>Output Log</span>
                                                <button onClick={() => navigator.clipboard.writeText(output)} className="hover:text-white">Copy Result</button>
                                            </div>
                                            <div className="overflow-x-auto">
                                                {tab === 'qr' ? <img src={output} className="mx-auto w-40 bg-white p-2 rounded-lg" /> : <pre className="text-xs font-mono text-gray-300 whitespace-pre-wrap">{output}</pre>}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}

                            {view === 'docs' && (
                                <div className="max-w-4xl mx-auto space-y-8 pb-12 animate-in fade-in duration-500">
                                    <div className="glass p-10 rounded-[3rem] border border-accent/20">
                                        <h2 className="text-4xl font-black italic uppercase text-accent mb-6 tracking-tighter text-center">Engine Manual & System Guide</h2>
                                        
                                        <div className="mb-10 p-6 bg-brand/10 border-brand/20 border rounded-2xl">
                                            <h4 className="text-white font-black uppercase text-sm mb-2 italic">What is ZylloKit Pro?</h4>
                                            <p className="text-gray-400 text-sm leading-relaxed">
                                                ZylloKit Pro is a premium "All-in-One" developer utility suite. Its primary objective is to streamline repetitive daily tasks for developers, students, and security researchers. The entire toolkit operates via **Client-Side execution**, ensuring your data never leaves your browser or touches our servers.
                                            </p>
                                        </div>

                                        <div className="space-y-10">
                                            <section className="border-l-4 border-accent pl-6 py-2">
                                                <h3 className="text-xl font-black text-white italic uppercase tracking-tight mb-4 flex items-center gap-3">
                                                    <i data-lucide="mail" className="text-accent"></i> 1. Email Verification
                                                </h3>
                                                <div className="text-gray-400 text-xs space-y-3">
                                                    <p><b>Benefit:</b> Ideal for cleaning databases or bulk leads by identifying syntax errors early.</p>
                                                    <p><b>Usage:</b> Enter the email in the input field and execute. It validates against the <code>RegEx RFC 5322</code> standard.</p>
                                                </div>
                                            </section>

                                            <section className="border-l-4 border-brand pl-6 py-2">
                                                <h3 className="text-xl font-black text-white italic uppercase tracking-tight mb-4 flex items-center gap-3">
                                                    <i data-lucide="code-2" className="text-accent"></i> 2. JSON Pretty Formatter
                                                </h3>
                                                <div className="text-gray-400 text-xs space-y-3">
                                                    <p><b>Benefit:</b> API responses are often minified and difficult to debug. This tool restructures them into a human-readable format.</p>
                                                    <p><b>Usage:</b> Paste raw JSON code. The engine will also flag any syntax errors found in the data.</p>
                                                </div>
                                            </section>

                                            <section className="border-l-4 border-accent pl-6 py-2">
                                                <h3 className="text-xl font-black text-white italic uppercase tracking-tight mb-4 flex items-center gap-3">
                                                    <i data-lucide="shrink" className="text-accent"></i> 3. Code Minification
                                                </h3>
                                                <div className="text-gray-400 text-xs space-y-3">
                                                    <p><b>Benefit:</b> Essential for optimizing website load speeds. It strips unnecessary whitespace and comments to reduce file size.</p>
                                                    <p><b>Usage:</b> Paste your CSS, JS, or HTML. The output is ready for direct production deployment.</p>
                                                </div>
                                            </section>

                                            <section className="border-l-4 border-brand pl-6 py-2">
                                                <h3 className="text-xl font-black text-white italic uppercase tracking-tight mb-4 flex items-center gap-3">
                                                    <i data-lucide="shield-check" className="text-accent"></i> 4. Security Audit (Simulated)
                                                </h3>
                                                <div className="text-gray-400 text-xs space-y-3">
                                                    <p><b>Benefit:</b> Designed for educational purposes, helping students understand cybersecurity basics by checking SSL and security headers.</p>
                                                    <p><b>Usage:</b> Paste a domain URL to generate an audit checklist report.</p>
                                                </div>
                                            </section>

                                            <section className="border-l-4 border-accent pl-6 py-2">
                                                <h3 className="text-xl font-black text-white italic uppercase tracking-tight mb-4 flex items-center gap-3">
                                                    <i data-lucide="fingerprint" className="text-accent"></i> 5. SHA-256 Hashing
                                                </h3>
                                                <div className="text-gray-400 text-xs space-y-3">
                                                    <p><b>Benefit:</b> Create a unique digital fingerprint for passwords or sensitive files to ensure data integrity.</p>
                                                    <p><b>Usage:</b> Generate a secure 64-character hash for any input string instantly.</p>
                                                </div>
                                            </section>

                                            <section className="border-l-4 border-brand pl-6 py-2">
                                                <h3 className="text-xl font-black text-white italic uppercase tracking-tight mb-4 flex items-center gap-3">
                                                    <i data-lucide="qr-code" className="text-accent"></i> 6. QR Bridge
                                                </h3>
                                                <div className="text-gray-400 text-xs space-y-3">
                                                    <p><b>Benefit:</b> Generate high-resolution QR codes instantly for offline marketing or quick URL sharing.</p>
                                                    <p><b>Usage:</b> Input any text or link to generate a scan-ready QR code.</p>
                                                </div>
                                            </section>

                                            <section className="border-l-4 border-accent pl-6 py-2">
                                                <h3 className="text-xl font-black text-white italic uppercase tracking-tight mb-4 flex items-center gap-3">
                                                    <i data-lucide="globe" className="text-accent"></i> 7. DNS Lookup Terminal
                                                </h3>
                                                <div className="text-gray-400 text-xs space-y-3">
                                                    <p><b>Benefit:</b> Verify if domain records (A, MX, etc.) have propagated during server setup.</p>
                                                    <p><b>Usage:</b> Enter a domain name (e.g., google.com) to fetch active record statuses.</p>
                                                </div>
                                            </section>

                                            <section className="border-l-4 border-brand pl-6 py-2">
                                                <h3 className="text-xl font-black text-white italic uppercase tracking-tight mb-4 flex items-center gap-3">
                                                    <i data-lucide="binary" className="text-accent"></i> 8. Base64 Binary Tool
                                                </h3>
                                                <div className="text-gray-400 text-xs space-y-3">
                                                    <p><b>Benefit:</b> Converts data into a URL-safe format. Excellent for inlining small images directly into CSS or HTML files.</p>
                                                    <p><b>Usage:</b> Paste your plain text to receive the encoded Base64 string.</p>
                                                </div>
                                            </section>
                                        </div>

                                        <div className="mt-12 p-8 bg-brand/10 border border-brand/20 rounded-[2rem] flex items-center gap-6">
                                            <div className="hidden sm:block p-4 bg-brand rounded-full text-white"><i data-lucide="zap"></i></div>
                                            <div>
                                                <h4 className="text-white font-black uppercase italic text-sm mb-1 tracking-widest">Architecture Tip</h4>
                                                <p className="text-xs text-gray-400 leading-relaxed font-medium">All tools leverage native browser <code>crypto</code> and <code>JSON</code> APIs, providing 10x faster performance via edge logic.</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {view === 'privacy' && (
                                <div className="max-w-3xl mx-auto glass p-10 rounded-[3rem] animate-in fade-in duration-500 border border-white/5">
                                    <h2 className="text-4xl font-black italic uppercase text-accent mb-6">Privacy Policy</h2>
                                    <div className="text-sm text-gray-400 space-y-6 leading-relaxed">
                                        <div className="p-6 bg-white/5 rounded-2xl">
                                            <p className="text-white font-bold uppercase text-xs mb-2 italic">1. Zero-Storage Protocol</p>
                                            <p>All computational logic occurs within your local browser environment. No user data is transmitted to or stored on our servers.</p>
                                        </div>
                                        <div className="p-6 bg-white/5 rounded-2xl">
                                            <p className="text-white font-bold uppercase text-xs mb-2 italic">2. Security Responsibility</p>
                                            <p>ZylloKit Pro is intended strictly for educational, development, and optimization purposes.</p>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {view === 'about' && (
                                <div className="max-w-3xl mx-auto glass p-10 rounded-[3rem] animate-in fade-in duration-500 border border-white/5">
                                    <h2 className="text-4xl font-black italic uppercase text-accent mb-6">About the Engine</h2>
                                    <p className="text-gray-300 leading-relaxed mb-8">
                                        <strong>ZylloKit Pro</strong> is a specialized toolkit engineered by <strong>SWITS Institute</strong>. It represents the pinnacle of lean, client-side developer tools.
                                    </p>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="p-6 bg-white/5 rounded-2xl border border-white/5 text-center">
                                            <div className="text-accent font-black text-2xl mb-1">3.0</div>
                                            <div className="uppercase font-black text-[10px] tracking-widest text-gray-500">Stable Version</div>
                                        </div>
                                        <div className="p-6 bg-white/5 rounded-2xl border border-white/5 text-center">
                                            <div className="text-accent font-black text-2xl mb-1">React</div>
                                            <div className="uppercase font-black text-[10px] tracking-widest text-gray-500">Engine Build</div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {view === 'contact' && (
                                <div className="max-w-3xl mx-auto glass p-10 rounded-[3rem] animate-in fade-in duration-500 border border-white/5">
                                    <h2 className="text-4xl font-black italic uppercase text-accent mb-6">Connect</h2>
                                    <div className="space-y-4">
                                        <a href="mailto:skillswithitsolution@gmail.com" className="flex items-center gap-4 p-5 bg-black/40 rounded-2xl border border-white/5 group hover:border-accent/50 transition-all block">
                                            <div className="p-3 bg-accent/10 rounded-xl text-accent group-hover:bg-accent group-hover:text-white"><i data-lucide="mail"></i></div>
                                            <span className="font-mono text-sm tracking-tight hover:text-accent">skillswithitsolution@gmail.com</span>
                                        </a>
                                    </div>
                                </div>
                            )}
                        </main>

                        {/* RIGHT SIDEBAR (ADS) */}
                        <aside className="w-80 glass border-l border-white/5 p-6 flex flex-col gap-6 hidden xl:flex">
                            <h3 className="text-[10px] font-black text-gray-500 uppercase tracking-widest italic">Sponsored Nodes</h3>
                            <div className="ad-spot w-full h-64 rounded-3xl flex items-center justify-center p-4 text-center">
                                <span className="text-[10px] text-gray-600 font-bold uppercase tracking-tighter italic">AdSense Space [300x250]</span>
                            </div>
                            <div className="glass rounded-2xl p-5 border border-brand/20 bg-brand/5">
                                <h4 className="text-[10px] font-black text-accent uppercase mb-3 italic tracking-widest flex items-center gap-2">
                                    <span className="w-2 h-2 bg-accent rounded-full animate-ping"></span> System Health
                                </h4>
                                <div className="space-y-2">
                                    <div className="flex justify-between text-xs font-mono"><span className="text-gray-500">Latency:</span> <span className="text-white">12ms</span></div>
                                    <div className="flex justify-between text-xs font-mono"><span className="text-gray-500">SSL:</span> <span className="text-accent font-bold">ACTIVE</span></div>
                                </div>
                            </div>
                        </aside>
                    </div>

                    {/* FOOTER */}
                    <footer className="glass border-t border-white/5 py-4 px-8 text-center flex justify-between items-center bg-black/60">
                        <p className="text-[9px] font-bold text-gray-600 uppercase tracking-widest italic tracking-[0.2em]">© 2026 Powered by SWITS Neural Tech Hub</p>
                        <div className="flex gap-4 items-center">
                             <div className="w-2 h-2 bg-accent rounded-full"></div>
                             <span className="text-[9px] font-black text-accent uppercase italic tracking-widest">Global v3.0 Stable Deployment</span>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
