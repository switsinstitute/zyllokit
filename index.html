<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>ZylloKit Pro | Premium Suite by SWITS</title>
    <meta name="description" content="High-performance developer tools. Secure, private, and local-first.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        brand: '#10b981', 
                        darker: '#020617', 
                        surface: '#0f172a',
                        accent: '#1e293b'
                    },
                    fontFamily: { 
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        heading: ['Space Grotesk', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background: #020617; 
            background-image: radial-gradient(circle at 0% 0%, #064e3b 0%, transparent 40%), 
                              radial-gradient(circle at 100% 100%, #111827 0%, transparent 40%);
            min-height: 100vh; 
            color: #f8fafc;
        }
        .glass-panel { 
            background: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .nav-link { position: relative; transition: all 0.3s ease; }
        .nav-link.active { color: #10b981; }
        .nav-link.active::after {
            content: ''; position: absolute; bottom: -5px; left: 0; width: 100%; height: 2px;
            background: #10b981; border-radius: 10px;
        }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .tool-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .tool-btn:hover { transform: translateY(-2px); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        input, textarea, select { transition: all 0.2s ease; }
        
        /* QR Code Responsiveness */
        #qrcode img {
            max-width: 100%;
            height: auto;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const AdUnit = () => (
            <div className="w-full py-6 md:py-8 flex justify-center border-y border-white/5 my-6 md:my-10 bg-white/5 px-4 text-center">
                <div className="w-full max-w-4xl overflow-hidden">
                    <p className="text-[10px] text-gray-600 uppercase tracking-widest mb-4 font-bold">Verified Advertisement</p>
                    <ins className="adsbygoogle" style={{ display: 'block' }} data-ad-client="ca-pub-6595809375510733" data-ad-slot="YOUR_SLOT_ID" data-ad-format="auto" data-full-width-responsive="true"></ins>
                </div>
            </div>
        );

        const Documentation = () => (
            <div className="fade-in space-y-10 md:space-y-16 py-8 md:py-12">
                <section className="text-center space-y-4">
                    <h2 className="text-2xl md:text-5xl font-extrabold font-heading px-4">Tool <span className="text-brand">Manifesto</span></h2>
                    <p className="text-gray-400 max-w-2xl mx-auto text-sm md:text-base px-6">ZylloKit Pro is architected for zero-latency developer workflows. All operations are 100% client-side.</p>
                </section>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8">
                    {[
                        { title: "QR Core", desc: "Uses Reed-Solomon algorithms for data recovery even if 30% of the code is damaged." },
                        { title: "JSON Logic", desc: "Recursive parsing engine that handles deep nested structures with O(n) complexity." },
                        { title: "Privacy First", desc: "No data ever reaches our servers. All processing happens in your local browser sandbox." }
                    ].map((item, i) => (
                        <div key={i} className="glass-panel p-6 md:p-8 rounded-3xl space-y-4 border-b-4 border-b-brand/20">
                            <h4 className="text-xl font-bold text-white">{item.title}</h4>
                            <p className="text-sm text-gray-500 leading-relaxed">{item.desc}</p>
                        </div>
                    ))}
                </div>
            </div>
        );

        const Contact = () => (
            <div className="fade-in py-10 md:py-20 text-center space-y-8 md:space-y-10 max-w-2xl mx-auto px-4">
                <div className="p-8 md:p-12 glass-panel rounded-[2.5rem] md:rounded-[3rem] space-y-6">
                    <div className="w-16 h-16 md:w-20 md:h-20 bg-brand/10 text-brand rounded-full flex items-center justify-center mx-auto">
                        <svg className="w-8 h-8 md:w-10 md:h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                    </div>
                    <h2 className="text-3xl md:text-4xl font-black font-heading">Get in <span className="text-brand">Touch</span></h2>
                    <p className="text-gray-400 text-sm md:text-base">Official technical support for ZylloKit and SWITS Institute inquiries.</p>
                    <a href="mailto:skillswithitsolution@gmail.com" className="text-lg md:text-2xl font-bold text-white block hover:text-brand transition-colors break-words">skillswithitsolution@gmail.com</a>
                </div>
            </div>
        );

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [activeTab, setActiveTab] = useState('qr');
            
            const [qrText, setQrText] = useState('https://zyllokit.pages.dev');
            const [jsonInput, setJsonInput] = useState('');
            const [pwLength, setPwLength] = useState(24);
            const [generatedPw, setGeneratedPw] = useState('');
            const [b64Input, setB64Input] = useState('');
            const [b64Output, setB64Output] = useState('');
            const [metaData, setMetaData] = useState({ title: '', desc: '', keys: '' });
            const [hashInput, setHashInput] = useState('');
            const [hashOutput, setHashOutput] = useState('');
            const [pxInput, setPxInput] = useState(16);

            useEffect(() => {
                if (currentPage === 'home' && activeTab === 'qr') {
                    const container = document.getElementById("qrcode");
                    if (container) {
                        container.innerHTML = "";
                        new QRCode(container, {
                            text: qrText || " ", width: 220, height: 220,
                            colorDark: "#020617", colorLight: "#ffffff"
                        });
                    }
                }
            }, [qrText, activeTab, currentPage]);

            const renderTool = () => {
                switch(activeTab) {
                    case 'qr': return (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12 items-center fade-in">
                            <div className="space-y-6">
                                <h3 className="text-xl md:text-2xl font-bold font-heading italic">QR Engine</h3>
                                <textarea value={qrText} onChange={(e) => setQrText(e.target.value)} className="w-full bg-black/40 border border-white/10 p-4 md:p-6 rounded-3xl h-36 md:h-44 font-mono text-sm focus:border-brand/50 outline-none" placeholder="Paste link or text..." />
                                <button onClick={() => {
                                    const img = document.querySelector('#qrcode img');
                                    if(img) {
                                        const link = document.createElement('a');
                                        link.href = img.src; link.download = 'ZylloKit_QR.png'; link.click();
                                    }
                                }} className="w-full py-4 bg-white text-black font-black rounded-2xl hover:bg-brand transition-all uppercase tracking-widest text-xs">Download PNG</button>
                            </div>
                            <div className="flex flex-col items-center justify-center p-6 md:p-8 bg-white/5 rounded-[2.5rem] md:rounded-[3rem] border border-white/5">
                                <div id="qrcode" className="p-4 md:p-6 bg-white rounded-[1.5rem] md:rounded-[2rem] shadow-2xl border-4 md:border-8 border-brand/20"></div>
                            </div>
                        </div>
                    );
                    case 'json': return (
                        <div className="space-y-6 fade-in">
                            <h3 className="text-xl md:text-2xl font-bold font-heading italic">JSON Prettifier</h3>
                            <textarea value={jsonInput} onChange={(e) => setJsonInput(e.target.value)} className="w-full bg-black/40 border border-white/10 p-6 md:p-8 rounded-[1.5rem] md:rounded-[2rem] h-64 md:h-96 font-mono text-sm focus:border-brand/50 outline-none" placeholder="Paste raw JSON here..." />
                            <div className="flex flex-col sm:flex-row gap-4">
                                <button onClick={() => { try { setJsonInput(JSON.stringify(JSON.parse(jsonInput), null, 4)); } catch(e) { alert("Invalid JSON"); } }} className="flex-1 py-4 bg-brand text-black font-black rounded-2xl uppercase tracking-widest text-xs">Prettify</button>
                                <button onClick={() => { navigator.clipboard.writeText(jsonInput); alert("Copied!"); }} className="px-10 py-4 bg-white/10 rounded-2xl font-bold text-xs uppercase">Copy</button>
                            </div>
                        </div>
                    );
                    case 'pass': return (
                        <div className="space-y-8 md:space-y-12 text-center py-6 md:py-10 fade-in">
                            <div className="space-y-2">
                                <h3 className="text-2xl md:text-3xl font-bold font-heading italic">Secure Shield</h3>
                                <p className="text-gray-500 text-xs md:text-sm italic">Military-grade entropy generation.</p>
                            </div>
                            <div className="p-6 md:p-12 glass-panel rounded-[2rem] md:rounded-[3rem] border border-brand/20 shadow-[0_0_50px_rgba(16,185,129,0.1)]">
                                <div className="text-lg md:text-4xl font-mono text-brand font-bold break-all mb-8 md:mb-10">{generatedPw || "••••••••••••"}</div>
                                <div className="max-w-xs mx-auto space-y-6">
                                    <div className="flex justify-between text-[10px] font-bold text-gray-500 uppercase"><span>Length</span><span>{pwLength}</span></div>
                                    <input type="range" min="8" max="64" value={pwLength} onChange={(e) => setPwLength(e.target.value)} className="w-full accent-brand cursor-pointer" />
                                    <button onClick={() => {
                                        const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+";
                                        let res = ""; for(let i=0; i<pwLength; i++) res += chars.charAt(Math.floor(Math.random() * chars.length));
                                        setGeneratedPw(res);
                                    }} className="w-full py-4 md:py-5 bg-brand text-black font-black rounded-2xl uppercase tracking-widest text-xs">Generate</button>
                                </div>
                            </div>
                        </div>
                    );
                    case 'base64': return (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8 fade-in">
                            <div className="space-y-4">
                                <h3 className="text-lg md:text-xl font-bold font-heading">String / Raw Data</h3>
                                <textarea value={b64Input} onChange={(e) => setB64Input(e.target.value)} className="w-full bg-black/40 border border-white/10 p-5 md:p-6 rounded-2xl h-48 md:h-64 font-mono text-sm outline-none focus:border-brand/50" placeholder="Type here..." />
                                <button onClick={() => setB64Output(btoa(b64Input))} className="w-full py-4 bg-brand text-black font-black rounded-xl text-xs uppercase">Encode Base64</button>
                            </div>
                            <div className="space-y-4">
                                <h3 className="text-lg md:text-xl font-bold font-heading text-brand">Encoded Output</h3>
                                <textarea value={b64Output} onChange={(e) => setB64Output(e.target.value)} className="w-full bg-black/20 border border-brand/20 p-5 md:p-6 rounded-2xl h-48 md:h-64 font-mono text-sm outline-none" placeholder="Result..." />
                                <button onClick={() => { try { setB64Input(atob(b64Output)); } catch(e) { alert("Invalid Base64"); } }} className="w-full py-4 bg-white/10 text-white font-black rounded-xl text-xs uppercase border border-white/5">Decode</button>
                            </div>
                        </div>
                    );
                    case 'meta': return (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12 fade-in">
                            <div className="space-y-4 md:space-y-6">
                                <h3 className="text-xl md:text-2xl font-bold font-heading">SEO Architect</h3>
                                <input type="text" placeholder="Site Title" className="w-full bg-black/40 border border-white/10 p-4 rounded-xl outline-none" value={metaData.title} onChange={e => setMetaData({...metaData, title: e.target.value})} />
                                <textarea placeholder="Site Description" className="w-full bg-black/40 border border-white/10 p-4 rounded-xl h-24 md:h-32 outline-none" value={metaData.desc} onChange={e => setMetaData({...metaData, desc: e.target.value})} />
                                <input type="text" placeholder="Keywords" className="w-full bg-black/40 border border-white/10 p-4 rounded-xl outline-none" value={metaData.keys} onChange={e => setMetaData({...metaData, keys: e.target.value})} />
                            </div>
                            <div className="bg-black/60 p-6 md:p-8 rounded-[1.5rem] md:rounded-[2rem] border border-white/5 font-mono text-[10px] md:text-[11px] text-brand/80 overflow-auto whitespace-pre min-h-[200px]">
                                {`<title>${metaData.title || 'Page Title'}</title>\n<meta name="description" content="${metaData.desc || 'Description here...'}">\n<meta name="keywords" content="${metaData.keys || 'Keywords...'}">\n<meta name="author" content="SWITS Institute">`}
                                <button onClick={() => { navigator.clipboard.writeText(`<title>${metaData.title}</title>\n<meta name="description" content="${metaData.desc}">`); alert("Tags Copied!"); }} className="mt-8 md:mt-10 block w-full py-3 bg-white/5 border border-white/10 text-white font-bold rounded-lg hover:bg-brand hover:text-black transition-all">Copy SEO Pack</button>
                            </div>
                        </div>
                    );
                    case 'hash': return (
                        <div className="space-y-8 fade-in text-center">
                            <h3 className="text-xl md:text-2xl font-bold font-heading italic">SHA-256 Hash Generator</h3>
                            <div className="max-w-xl mx-auto space-y-4">
                                <input type="text" value={hashInput} onChange={(e) => {
                                    setHashInput(e.target.value);
                                    setHashOutput(CryptoJS.SHA256(e.target.value).toString());
                                }} className="w-full bg-black/40 border border-white/10 p-6 rounded-2xl text-center text-lg md:text-xl outline-none focus:border-brand/50" placeholder="Enter text to hash..." />
                                <div className="p-4 md:p-6 bg-brand/5 border border-brand/20 rounded-2xl break-all font-mono text-center text-sm md:text-base text-brand">
                                    {hashOutput || "Hash result will appear here"}
                                </div>
                            </div>
                        </div>
                    );
                    case 'rem': return (
                        <div className="max-w-md mx-auto py-6 md:py-10 fade-in text-center space-y-8">
                            <h3 className="text-xl md:text-2xl font-bold font-heading">PX to REM Converter</h3>
                            <div className="flex flex-row items-center gap-2 md:gap-4 justify-center">
                                <div className="space-y-2">
                                    <label className="text-[10px] font-bold uppercase text-gray-500">Pixels</label>
                                    <input type="number" value={pxInput} onChange={(e) => setPxInput(e.target.value)} className="w-24 md:w-32 bg-black/40 border border-white/10 p-4 md:p-6 rounded-2xl text-center text-xl md:text-2xl outline-none" />
                                </div>
                                <div className="text-brand text-xl md:text-3xl font-bold pt-6">→</div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-bold uppercase text-gray-500">REM</label>
                                    <div className="w-24 md:w-32 bg-brand/10 border border-brand/20 p-4 md:p-6 rounded-2xl text-center text-xl md:text-2xl font-black text-brand italic">
                                        {pxInput / 16}
                                    </div>
                                </div>
                            </div>
                            <p className="text-gray-500 text-[10px] md:text-xs italic">Standard root size is 16px.</p>
                        </div>
                    );
                    default: return <div className="text-center py-20 text-gray-500 italic">Feature loading...</div>;
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="sticky top-0 z-50 p-4 md:p-6 glass-panel border-b border-white/5">
                        <div className="max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => setCurrentPage('home')}>
                                <div className="h-10 w-10 md:h-12 md:w-12 bg-gradient-to-br from-brand to-emerald-700 rounded-xl md:rounded-2xl flex items-center justify-center font-black text-black text-lg md:text-xl shadow-lg shadow-brand/20 transition-transform hover:scale-105">ZK</div>
                                <div>
                                    <h1 className="text-lg md:text-xl font-black font-heading tracking-tighter uppercase leading-none">ZylloKit <span className="text-brand">Pro</span></h1>
                                    <p className="text-[8px] md:text-[9px] text-gray-500 font-bold tracking-[2px] md:tracking-[3px] uppercase">By SWITS Institute</p>
                                </div>
                            </div>
                            <div className="flex gap-4 md:gap-8 text-[9px] md:text-[11px] font-black uppercase tracking-widest text-gray-400">
                                {['home', 'about', 'privacy', 'contact'].map(p => (
                                    <button key={p} onClick={() => setCurrentPage(p)} className={`nav-link ${currentPage === p ? 'active' : ''}`}>{p}</button>
                                ))}
                            </div>
                        </div>
                    </nav>

                    <main className="flex-grow max-w-6xl mx-auto w-full px-4 md:px-6 py-8 md:py-12">
                        {currentPage === 'home' && (
                            <div className="space-y-8 md:space-y-12">
                                <header className="text-center space-y-4 py-6 md:py-10">
                                    <h2 className="text-3xl sm:text-5xl md:text-7xl font-black font-heading tracking-tighter italic px-2">
                                        The <span className="text-brand underline decoration-white/10">Elite</span> Toolkit.
                                    </h2>
                                    <p className="text-gray-400 max-w-xl mx-auto font-medium text-sm md:text-base px-4">Professional grade utilities for modern software engineers. No data leaves your machine.</p>
                                </header>

                                <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-7 gap-2 md:gap-3 max-w-5xl mx-auto">
                                    {[
                                        {id: 'qr', label: 'QR'}, {id: 'json', label: 'JSON'}, 
                                        {id: 'pass', label: 'Pass'}, {id: 'base64', label: 'B64'},
                                        {id: 'meta', label: 'SEO'}, {id: 'hash', label: 'HASH'},
                                        {id: 'rem', label: 'REM'}
                                    ].map(tab => (
                                        <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`py-3 md:py-4 px-1 rounded-xl md:rounded-2xl text-[9px] md:text-[10px] font-black uppercase tracking-tighter md:tracking-widest transition-all ${activeTab === tab.id ? 'bg-brand text-black shadow-xl scale-105' : 'bg-white/5 text-gray-500 hover:text-white border border-white/5'}`}>
                                            {tab.label}
                                        </button>
                                    ))}
                                </div>

                                <div className="glass-panel rounded-[2rem] md:rounded-[4rem] p-6 md:p-16 relative overflow-hidden fade-in min-h-[400px] md:min-h-[550px] border-t-brand/30 border-t-2">
                                    <div className="absolute top-0 right-0 w-48 h-48 md:w-80 md:h-80 bg-brand/5 rounded-full blur-[80px] md:blur-[120px] pointer-events-none"></div>
                                    {renderTool()}
                                </div>
                                
                                <AdUnit />
                                <Documentation />
                            </div>
                        )}

                        {currentPage === 'about' && (
                            <div className="fade-in max-w-4xl mx-auto space-y-8 md:space-y-12 py-6 md:py-10 px-2">
                                <h2 className="text-3xl md:text-5xl font-black font-heading text-center italic leading-tight">Crafted by <span className="text-brand underline decoration-white/20">Engineers</span></h2>
                                <div className="glass-panel p-8 md:p-12 rounded-[2rem] md:rounded-[3.5rem] space-y-6 md:space-y-8 leading-relaxed text-gray-400 border-b-brand border-b-4">
                                    <p className="text-lg md:text-xl">ZylloKit Pro is a flagship project by <strong>SWITS Institute</strong>, Karachi. It was designed to fill the gap between clumsy web tools and privacy-first developer requirements.</p>
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-6 pt-8 border-t border-white/5">
                                        <div><h6 className="text-brand font-bold text-[9px] md:text-[10px] uppercase mb-1">Architecture</h6><p className="text-white font-bold text-xs md:text-sm">React 18</p></div>
                                        <div><h6 className="text-brand font-bold text-[9px] md:text-[10px] uppercase mb-1">Styles</h6><p className="text-white font-bold text-xs md:text-sm">Tailwind CSS</p></div>
                                        <div><h6 className="text-brand font-bold text-[9px] md:text-[10px] uppercase mb-1">Privacy</h6><p className="text-white font-bold text-xs md:text-sm">Local-Only</p></div>
                                        <div><h6 className="text-brand font-bold text-[9px] md:text-[10px] uppercase mb-1">Agency</h6><p className="text-white font-bold text-xs md:text-sm">SWITS Lab</p></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {currentPage === 'contact' && <Contact />}
                        
                        {currentPage === 'privacy' && (
                            <div className="fade-in max-w-3xl mx-auto space-y-8 md:space-y-12 px-4">
                                <h2 className="text-3xl md:text-4xl font-black font-heading text-center italic">Zero-Log <span className="text-brand">Protocol</span></h2>
                                <div className="glass-panel p-8 md:p-10 rounded-[1.5rem] md:rounded-[2rem] space-y-6 text-sm text-gray-400">
                                    <p>Your privacy is our mechanical baseline. ZylloKit Pro does not utilize any server-side storage or database for user-inputted data.</p>
                                    <ul className="list-disc ml-5 space-y-2">
                                        <li>All encryption happens in <strong>Browser Memory</strong>.</li>
                                        <li>No third-party trackers are injected into tool outputs.</li>
                                        <li>Source code is optimized for local performance.</li>
                                    </ul>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="py-12 md:py-20 border-t border-white/5 bg-darker text-center px-4">
                        <div className="max-w-6xl mx-auto space-y-8">
                            <div className="flex justify-center gap-6 md:gap-10 text-[9px] md:text-[10px] font-black uppercase tracking-[2px] md:tracking-[4px] text-gray-600">
                                <button onClick={() => setCurrentPage('privacy')} className="hover:text-brand transition">Privacy</button>
                                <button onClick={() => setCurrentPage('about')} className="hover:text-brand transition">About</button>
                                <button onClick={() => setCurrentPage('contact')} className="hover:text-brand transition">Support</button>
                            </div>
                            <p className="text-[8px] md:text-[10px] text-gray-800 font-bold uppercase tracking-[8px] md:tracking-[15px] break-words">SWITS INSTITUTE • KARACHI • PAKISTAN</p>
                            <p className="text-[10px] md:text-[11px] text-gray-600">&copy; 2026 ZylloKit Pro. Powered by SWITS Neural Engine v2.0</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
