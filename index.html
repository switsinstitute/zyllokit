<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>ZylloKit Pro | Professional Developer Tools by SWITS Institute</title>
    <meta name="description" content="ZylloKit Pro - Premium suite of developer tools including QR Generator, JSON Prettifier, and Glassmorphism Designer. Built for speed and privacy by SWITS Institute.">
    <meta name="author" content="SWITS Institute">
    <meta name="robots" content="index, follow">

    <link rel="icon" type="image/png" href="./favicon.png?v=2">
    <link rel="apple-touch-icon" href="./favicon.png?v=2">
    <link rel="shortcut icon" type="image/png" href="./favicon.png?v=2">
    <meta property="og:image" content="https://zyllokit.pages.dev/favicon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        brand: '#10b981', 
                        darker: '#050505', 
                        surface: '#0f1715',
                        accent: '#134e4a'
                    },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background: radial-gradient(circle at top right, #0d2d24, #050505); min-height: 100vh; color: #e2e8f0; }
        .glass-card { background: rgba(15, 23, 21, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(16, 185, 129, 0.1); }
        .neon-glow { box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        .ad-placeholder { background: repeating-linear-gradient(45deg, rgba(16, 185, 129, 0.03), rgba(16, 185, 129, 0.03) 10px, transparent 10px, transparent 20px); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #134e4a; border-radius: 10px; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        textarea::placeholder { color: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- UI COMPONENTS ---

        const AdSlot = ({ type }) => {
            const isAdActive = false; 
            if (isAdActive) {
                return (
                    <div className="w-full flex justify-center py-4">
                        <ins className="adsbygoogle" style={{display:'block'}} data-ad-client="ca-pub-xxx" data-ad-slot="xxx" data-ad-format="auto"></ins>
                    </div>
                );
            }
            return (
                <div className="w-full ad-placeholder border border-brand/10 rounded-2xl p-6 flex flex-col items-center justify-center text-center group transition-all hover:border-brand/30">
                    {type === 'banner' ? (
                        <div className="flex flex-col md:flex-row items-center gap-4">
                            <div className="p-2 bg-brand/10 rounded-lg text-brand text-xs font-bold uppercase tracking-widest">Tip</div>
                            <p className="text-sm text-gray-400 italic font-medium">"Efficiency is doing things right; effectiveness is doing the right things." — Lean Scale Logic.</p>
                        </div>
                    ) : (
                        <div className="space-y-3">
                            <div className="h-12 w-12 bg-brand/10 rounded-full flex items-center justify-center mx-auto mb-2 group-hover:scale-110 transition-transform text-brand">
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                            </div>
                            <h4 className="text-brand font-bold uppercase tracking-[4px] text-xs">Secure by Design</h4>
                            <p className="text-gray-500 text-[10px] md:text-xs max-w-xs mx-auto">All data is processed locally in your browser. We never store your inputs on our servers.</p>
                        </div>
                    )}
                </div>
            );
        };

        // --- PAGE SECTIONS ---

        const AboutPage = () => (
            <div className="fade-in space-y-8 max-w-3xl mx-auto py-10 px-4">
                <div className="text-center space-y-4">
                    <h2 className="text-3xl md:text-4xl font-extrabold tracking-tighter">About <span className="text-brand">ZylloKit</span></h2>
                    <p className="text-gray-400 font-medium">The Professional Developer's Swiss Army Knife.</p>
                </div>
                <div className="glass-card rounded-[2rem] md:rounded-[2.5rem] p-6 md:p-10 space-y-6 leading-relaxed text-gray-300">
                    <p>ZylloKit is a premium suite of developer tools designed by <strong>SWITS Institute</strong>. We believe in high-performance, minimalist software that follows the <strong>Lean Scale Model™</strong>.</p>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
                        <div className="p-4 border border-white/5 rounded-2xl bg-white/5">
                            <h4 className="text-brand font-bold mb-2">Private</h4>
                            <p className="text-xs text-gray-500">Processing happens 100% on the client-side. No databases, no logs.</p>
                        </div>
                        <div className="p-4 border border-white/5 rounded-2xl bg-white/5">
                            <h4 className="text-brand font-bold mb-2">Fast</h4>
                            <p className="text-xs text-gray-500">Built with modern React and Tailwind CSS for instant feedback.</p>
                        </div>
                    </div>
                    <p className="pt-6 border-t border-white/5 text-sm italic">Developed under the mission of SWITS Institute to elevate technical education and digital standards globally.</p>
                </div>
            </div>
        );

        const PrivacyPage = () => (
            <div className="fade-in space-y-8 max-w-3xl mx-auto py-10 px-4">
                <h2 className="text-3xl md:text-4xl font-extrabold tracking-tighter text-center italic">Privacy <span className="text-brand">Protocol</span></h2>
                <div className="glass-card rounded-[2rem] md:rounded-[2.5rem] p-6 md:p-10 space-y-8">
                    <section>
                        <h3 className="text-lg md:text-xl font-bold text-white mb-3">1. Data Sovereignty</h3>
                        <p className="text-gray-400 text-sm">ZylloKit does not collect, store, or transmit your personal data. All tools, including the QR Generator and JSON Prettifier, work entirely within your browser's local memory.</p>
                    </section>
                    <section>
                        <h3 className="text-lg md:text-xl font-bold text-white mb-3">2. Cookies & Analytics</h3>
                        <p className="text-gray-400 text-sm">We may use standard cookies for site performance and Google Adsense to display advertisements. These third-party services may collect data to provide personalized experiences.</p>
                    </section>
                    <section>
                        <h3 className="text-lg md:text-xl font-bold text-white mb-3">3. Security</h3>
                        <p className="text-gray-400 text-sm">Our platform uses SSL encryption to ensure your connection is secure. Since we do not have a backend for these tools, your input data never leaves your device.</p>
                    </section>
                </div>
            </div>
        );

        const ToolsPage = ({ activeTab, setActiveTab, qrText, setQrText, jsonInput, setJsonInput, jsonError, handleJsonFormat, blur, setBlur, opacity, setOpacity, downloadQR }) => (
            <div className="fade-in px-4">
                <div className="mb-8"><AdSlot type="banner" /></div>
                
                <div className="flex p-1.5 bg-darker/50 rounded-2xl border border-white/5 mb-8 max-w-md mx-auto overflow-x-auto">
                    {['qr', 'json', 'glass'].map(t => (
                        <button key={t} onClick={() => setActiveTab(t)} className={`flex-1 py-3 px-2 rounded-xl text-[10px] md:text-sm font-bold transition-all whitespace-nowrap ${activeTab === t ? 'bg-brand text-black shadow-xl' : 'text-gray-400 hover:text-white'}`}>
                            {t.toUpperCase()}
                        </button>
                    ))}
                </div>

                <div className="glass-card rounded-[2rem] md:rounded-[2.5rem] p-6 md:p-12 shadow-2xl relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-64 h-64 bg-brand/5 rounded-full blur-[100px] pointer-events-none"></div>
                    
                    {activeTab === 'qr' && (
                        <div className="grid md:grid-cols-2 gap-8 md:gap-12 items-center">
                            <div className="space-y-6 order-2 md:order-1">
                                <h3 className="text-2xl font-bold text-white tracking-tight">QR Engine</h3>
                                <textarea value={qrText} onChange={(e) => setQrText(e.target.value)} className="w-full bg-black/40 border border-white/10 p-5 rounded-2xl focus:border-brand transition-all outline-none h-40 font-mono text-sm" placeholder="Enter link or text..." />
                                <button onClick={downloadQR} className="w-full py-4 bg-white/5 border border-white/10 rounded-2xl font-bold hover:bg-white/10 transition active:scale-95">Export as PNG</button>
                            </div>
                            <div className="flex flex-col items-center justify-center order-1 md:order-2">
                                <div className="bg-white p-4 md:p-6 rounded-[1.5rem] md:rounded-[2rem] shadow-2xl border-[6px] md:border-[8px] border-brand/20" id="qrcode"></div>
                                <p className="text-[10px] text-gray-500 mt-4 uppercase tracking-widest font-bold">Auto-updates on type</p>
                            </div>
                        </div>
                    )}

                    {activeTab === 'json' && (
                        <div className="space-y-6">
                            <div className="flex justify-between items-center">
                                <h3 className="text-2xl font-bold tracking-tight">JSON Prettifier</h3>
                                {jsonError && <span className="text-red-500 text-[10px] font-bold bg-red-500/10 px-3 py-1 rounded-full animate-pulse border border-red-500/20">{jsonError}</span>}
                            </div>
                            <textarea 
                                value={jsonInput} 
                                onChange={(e) => setJsonInput(e.target.value)} 
                                placeholder="Paste your raw JSON code here..." 
                                className={`w-full h-80 bg-black/40 border p-6 rounded-[1.5rem] md:rounded-[2rem] font-mono text-sm focus:border-brand outline-none transition-all ${jsonError ? 'border-red-500/50' : 'border-white/10'}`} 
                            />
                            <div className="flex flex-col md:flex-row gap-4">
                                <button onClick={handleJsonFormat} className="flex-[2] py-4 bg-brand text-black font-extrabold rounded-2xl hover:brightness-110 active:scale-95 transition">FORMAT CODE</button>
                                <button onClick={() => { if(!jsonInput){return;} navigator.clipboard.writeText(jsonInput); alert("Copied to clipboard!") }} className="flex-1 py-4 bg-white/5 border border-white/10 rounded-2xl font-bold hover:bg-white/10 active:scale-95 transition">COPY</button>
                            </div>
                        </div>
                    )}

                    {activeTab === 'glass' && (
                        <div className="grid md:grid-cols-2 gap-12">
                            <div className="space-y-8">
                                <h3 className="text-2xl font-bold tracking-tight">Glass Designer</h3>
                                <div className="space-y-6">
                                    <div className="space-y-2">
                                        <div className="flex justify-between text-xs font-bold uppercase text-gray-500"><span>Blur Amount</span><span>{blur}px</span></div>
                                        <input type="range" min="0" max="40" value={blur} onChange={(e) => setBlur(e.target.value)} className="w-full h-2 bg-white/5 rounded-lg appearance-none cursor-pointer accent-brand" />
                                    </div>
                                    <div className="space-y-2">
                                        <div className="flex justify-between text-xs font-bold uppercase text-gray-500"><span>Transparency</span><span>{opacity}</span></div>
                                        <input type="range" min="0" max="1" step="0.1" value={opacity} onChange={(e) => setOpacity(e.target.value)} className="w-full h-2 bg-white/5 rounded-lg appearance-none cursor-pointer accent-brand" />
                                    </div>
                                </div>
                            </div>
                            <div className="h-64 rounded-[2rem] relative overflow-hidden flex items-center justify-center border border-white/5" style={{background: 'linear-gradient(135deg, #0d2d24 0%, #050505 100%)'}}>
                                <div style={{ backdropFilter: `blur(${blur}px)`, background: `rgba(255,255,255,${opacity})` }} className="w-2/3 h-2/3 rounded-3xl border border-white/20 shadow-2xl flex items-center justify-center">
                                    <span className="font-bold text-[10px] tracking-widest uppercase text-white/50">Preview Box</span>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
                <div className="mt-8"><AdSlot type="rectangle" /></div>
            </div>
        );

        // --- MAIN APP ---

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [activeTab, setActiveTab] = useState('qr');
            const [qrText, setQrText] = useState('https://zyllokit.pages.dev');
            const [jsonInput, setJsonInput] = useState('');
            const [jsonError, setJsonError] = useState(null);
            const [blur, setBlur] = useState(15);
            const [opacity, setOpacity] = useState(0.2);

            const downloadQR = () => {
                const img = document.querySelector('#qrcode img');
                if (img) {
                    const link = document.createElement('a');
                    link.href = img.src;
                    link.download = 'ZylloKit_QR.png';
                    link.click();
                }
            };

            const handleJsonFormat = () => {
                try {
                    if (!jsonInput.trim()) return;
                    const parsed = JSON.parse(jsonInput);
                    setJsonInput(JSON.stringify(parsed, null, 4));
                    setJsonError(null);
                } catch(e) {
                    setJsonError("Invalid JSON Syntax");
                }
            };

            useEffect(() => {
                if (currentPage === 'home' && activeTab === 'qr') {
                    const container = document.getElementById("qrcode");
                    if (container) {
                        container.innerHTML = "";
                        new QRCode(container, {
                            text: qrText || " ", width: 200, height: 200,
                            colorDark: "#050505", colorLight: "#ffffff",
                            correctLevel: QRCode.CorrectLevel.H
                        });
                    }
                }
            }, [qrText, activeTab, currentPage]);

            return (
                <div className="pb-20">
                    <nav className="p-6 flex justify-between items-center max-w-6xl mx-auto">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => setCurrentPage('home')}>
                            <div className="h-10 w-10 bg-gradient-to-br from-brand to-emerald-800 rounded-xl flex items-center justify-center font-extrabold text-black shadow-lg neon-glow">ZK</div>
                            <div className="hidden sm:block">
                                <h1 className="text-xl font-extrabold tracking-tighter leading-none uppercase">ZYLLOKIT</h1>
                                <p className="text-[10px] text-gray-500 tracking-[3px] uppercase">By SWITS Institute</p>
                            </div>
                        </div>
                        <div className="flex gap-4 md:gap-6 text-[10px] font-bold uppercase tracking-widest text-gray-400">
                            <button onClick={() => setCurrentPage('home')} className={`hover:text-brand transition ${currentPage === 'home' ? 'text-brand' : ''}`}>Tools</button>
                            <button onClick={() => setCurrentPage('about')} className={`hover:text-brand transition ${currentPage === 'about' ? 'text-brand' : ''}`}>About</button>
                            <button onClick={() => setCurrentPage('privacy')} className={`hover:text-brand transition ${currentPage === 'privacy' ? 'text-brand' : ''}`}>Privacy</button>
                        </div>
                    </nav>

                    <main className="max-w-5xl mx-auto mt-8">
                        {currentPage === 'home' && (
                            <ToolsPage 
                                activeTab={activeTab} setActiveTab={setActiveTab}
                                qrText={qrText} setQrText={setQrText}
                                jsonInput={jsonInput} setJsonInput={setJsonInput}
                                jsonError={jsonError} handleJsonFormat={handleJsonFormat}
                                blur={blur} setBlur={setBlur}
                                opacity={opacity} setOpacity={setOpacity}
                                downloadQR={downloadQR}
                            />
                        )}
                        {currentPage === 'about' && <AboutPage />}
                        {currentPage === 'privacy' && <PrivacyPage />}

                        <div className="mt-24 px-6 flex flex-col items-center gap-6">
                            <h2 className="text-xl md:text-2xl font-extrabold tracking-tighter text-center uppercase">Managed by <span className="text-brand">SWITS Institute</span></h2>
                            <p className="text-gray-500 text-xs text-center max-w-xl leading-relaxed">
                                A product of our Lean Operations — delivering international standard technical tools for developers worldwide. Securely processed on your local device.
                            </p>
                        </div>
                    </main>

                    <footer className="mt-24 py-10 border-t border-white/5 text-center">
                        <p className="text-[8px] md:text-[9px] text-gray-700 font-bold uppercase tracking-[6px] md:tracking-[10px]">Secure • Private • International</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
